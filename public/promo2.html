<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TrackBeacon — promo (deals)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family:"Plus Jakarta Sans",system-ui,sans-serif; background:#05070f; color:#e2e8f0; overflow:hidden; display:grid; place-items:center; min-height:100vh; }
  .stage { position:relative; width:min(100vw,56.25vh); height:min(177.78vw,100vh); overflow:hidden;
    background:
      radial-gradient(40rem 40rem at 110% -10%, rgba(16,185,129,.28), transparent 60%),
      radial-gradient(34rem 34rem at -10% 10%, rgba(14,165,233,.22), transparent 55%),
      radial-gradient(34rem 34rem at 50% 120%, rgba(99,102,241,.26), transparent 60%), #05070f; }
  .orb { position:absolute; border-radius:9999px; filter:blur(60px); opacity:.5; }
  .orb1 { width:55%; aspect-ratio:1; left:-15%; top:-8%; background:#10b981; animation:float 9s ease-in-out infinite; }
  .orb2 { width:50%; aspect-ratio:1; right:-12%; bottom:8%; background:#0ea5e9; animation:float 12s ease-in-out infinite reverse; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(6%,-6%)} }
  .scene { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:8% 9%; gap:20px; opacity:0; }
  .big { font-weight:800; font-size:clamp(28px,8.5vw,52px); line-height:1.05; letter-spacing:-.02em; }
  .sub { font-weight:500; font-size:clamp(15px,4.4vw,22px); color:#cbd5e1; }
  .grad { background:linear-gradient(120deg,#34d399,#38bdf8 60%,#22d3ee); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand { position:absolute; top:5%; left:0; right:0; text-align:center; font-weight:800; font-size:18px; opacity:.9; }
  .brand span { background:linear-gradient(120deg,#34d399,#22d3ee); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .card { width:80%; border-radius:22px; padding:20px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(14px); box-shadow:0 30px 60px -20px rgba(16,185,129,.55); }
  .row { display:flex; align-items:center; justify-content:center; gap:14px; }
  .old { color:#94a3b8; text-decoration:line-through; font-weight:700; font-size:24px; }
  .new { color:#34d399; font-weight:800; font-size:36px; }
  .toast { width:82%; border-radius:18px; padding:16px 18px; text-align:left; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); backdrop-filter:blur(14px); box-shadow:0 24px 50px -18px rgba(0,0,0,.7); }
  .toast .t { font-weight:800; font-size:16px; }
  .toast .d { font-size:14px; color:#cbd5e1; margin-top:4px; }
  .url { font-weight:800; font-size:clamp(20px,6vw,30px); background:linear-gradient(120deg,#34d399,#22d3ee); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .cta-badge { font-size:13px; font-weight:700; color:#94a3b8; }
  .s1 { animation:s1 16s infinite; } .s2 { animation:s2 16s infinite; } .s3 { animation:s3 16s infinite; } .s4 { animation:s4 16s infinite; }
  @keyframes s1 { 0%{opacity:0;transform:scale(.96)} 3%,22%{opacity:1;transform:scale(1)} 26%,100%{opacity:0} }
  @keyframes s2 { 0%,26%{opacity:0;transform:translateY(14px)} 30%,47%{opacity:1;transform:translateY(0)} 51%,100%{opacity:0} }
  @keyframes s3 { 0%,51%{opacity:0;transform:translateY(14px)} 55%,72%{opacity:1;transform:translateY(0)} 76%,100%{opacity:0} }
  @keyframes s4 { 0%,76%{opacity:0;transform:scale(.96)} 80%,97%{opacity:1;transform:scale(1)} 100%{opacity:0} }
  @media (prefers-reduced-motion: reduce){ .s1,.s2,.s3,.s4{animation-duration:0s} }
</style>
</head>
<body>
  <div class="stage">
    <div class="orb orb1"></div><div class="orb orb2"></div>
    <div class="brand">👟 <span>TrackBeacon</span></div>
    <section class="scene s1"><div class="big">Sneakers are<br><span class="grad">dropping in price</span> 📉</div><div class="sub">…you're just not seeing it.</div></section>
    <section class="scene s2">
      <div class="big">We track every<br><span class="grad">price change</span></div>
      <div class="card"><div class="sub" style="margin-bottom:8px">Air Jordan 4 Retro</div><div class="row"><span class="old">$250</span><span class="new">$180</span></div></div>
    </section>
    <section class="scene s3">
      <div class="big">Get the <span class="grad">drop</span> in your inbox</div>
      <div class="toast"><div class="t">💸 Price drop</div><div class="d">Air Jordan 4 just dropped $70 — now $180.</div></div>
    </section>
    <section class="scene s4"><div class="big">Cop at <span class="grad">retail</span> 👟</div><div class="url">trackbeacon.online</div><div class="cta-badge">Free · link in bio</div></section>
  </div>
</body>
</html>
