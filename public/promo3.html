<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TrackBeacon — promo (how it works)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family:"Plus Jakarta Sans",system-ui,sans-serif; background:#05070f; color:#e2e8f0; overflow:hidden; display:grid; place-items:center; min-height:100vh; }
  .stage { position:relative; width:min(100vw,56.25vh); height:min(177.78vw,100vh); overflow:hidden;
    background:
      radial-gradient(40rem 40rem at 110% -10%, rgba(168,85,247,.30), transparent 60%),
      radial-gradient(34rem 34rem at -10% 10%, rgba(99,102,241,.24), transparent 55%),
      radial-gradient(34rem 34rem at 50% 120%, rgba(14,165,233,.24), transparent 60%), #05070f; }
  .orb { position:absolute; border-radius:9999px; filter:blur(60px); opacity:.5; }
  .orb1 { width:55%; aspect-ratio:1; left:-15%; top:-8%; background:#a855f7; animation:float 9s ease-in-out infinite; }
  .orb2 { width:50%; aspect-ratio:1; right:-12%; bottom:8%; background:#6366f1; animation:float 12s ease-in-out infinite reverse; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(6%,-6%)} }
  .scene { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:8% 9%; gap:18px; opacity:0; }
  .big { font-weight:800; font-size:clamp(28px,8.5vw,52px); line-height:1.05; letter-spacing:-.02em; }
  .sub { font-weight:500; font-size:clamp(15px,4.4vw,22px); color:#cbd5e1; }
  .grad { background:linear-gradient(120deg,#c084fc,#818cf8 55%,#38bdf8); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .brand { position:absolute; top:5%; left:0; right:0; text-align:center; font-weight:800; font-size:18px; opacity:.9; }
  .brand span { background:linear-gradient(120deg,#c084fc,#38bdf8); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .step { width:84%; border-radius:18px; padding:16px 18px; display:flex; gap:14px; align-items:center; text-align:left; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); backdrop-filter:blur(14px); }
  .num { width:42px; height:42px; flex:none; border-radius:12px; background:linear-gradient(135deg,#a855f7,#38bdf8); display:grid; place-items:center; font-weight:800; font-size:20px; }
  .step .tx { font-weight:700; font-size:16px; }
  .url { font-weight:800; font-size:clamp(20px,6vw,30px); background:linear-gradient(120deg,#c084fc,#38bdf8); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .cta-badge { font-size:13px; font-weight:700; color:#94a3b8; }
  .s1 { animation:s1 16s infinite; } .s2 { animation:s2 16s infinite; } .s3 { animation:s3 16s infinite; } .s4 { animation:s4 16s infinite; }
  @keyframes s1 { 0%{opacity:0;transform:scale(.96)} 3%,22%{opacity:1;transform:scale(1)} 26%,100%{opacity:0} }
  @keyframes s2 { 0%,26%{opacity:0;transform:translateY(14px)} 30%,47%{opacity:1;transform:translateY(0)} 51%,100%{opacity:0} }
  @keyframes s3 { 0%,51%{opacity:0;transform:translateY(14px)} 55%,72%{opacity:1;transform:translateY(0)} 76%,100%{opacity:0} }
  @keyframes s4 { 0%,76%{opacity:0;transform:scale(.96)} 80%,97%{opacity:1;transform:scale(1)} 100%{opacity:0} }
  @media (prefers-reduced-motion: reduce){ .s1,.s2,.s3,.s4{animation-duration:0s} }
</style>
</head>
<body>
  <div class="stage">
    <div class="orb orb1"></div><div class="orb orb2"></div>
    <div class="brand">👟 <span>TrackBeacon</span></div>
    <section class="scene s1"><div class="big">How to never<br>miss a <span class="grad">drop</span> 👇</div></section>
    <section class="scene s2"><div class="step"><div class="num">1</div><div class="tx">Pick the sneaker you want</div></div></section>
    <section class="scene s3">
      <div class="step"><div class="num">2</div><div class="tx">We watch it 24/7</div></div>
      <div class="step"><div class="num">3</div><div class="tx">You get an email the second it's back or cheaper</div></div>
    </section>
    <section class="scene s4"><div class="big">That's it. <span class="grad">Free.</span></div><div class="url">trackbeacon.online</div><div class="cta-badge">link in bio 👟</div></section>
  </div>
</body>
</html>
