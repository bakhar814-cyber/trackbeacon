name: Daily Production

# Triggers the production pipeline on the deployed app twice a day. The app's
# /api/cron/produce endpoint plans + enqueues the day's episodes; the running
# worker then drains the queue. Authentication is via the x-cron-secret header.
#
# Required repository secrets:
#   APP_BASE_URL  → e.g. https://toonfactory.example.com
#   CRON_SECRET   → must match the CRON_SECRET env var on the deployed app
on:
  schedule:
    # 08:00 and 18:00 UTC, every day (cron is always UTC on GitHub Actions).
    - cron: "0 8 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch: {}

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production run
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          echo "Triggering production at ${APP_BASE_URL}/api/cron/produce"
          http_code=$(curl -sS -o /tmp/produce.out -w "%{http_code}" \
            -X POST "${APP_BASE_URL}/api/cron/produce" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -H "content-type: application/json" \
            -d '{}')
          echo "Response (${http_code}):"
          cat /tmp/produce.out
          echo
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Production endpoint returned HTTP ${http_code}"
            exit 1
          fi
