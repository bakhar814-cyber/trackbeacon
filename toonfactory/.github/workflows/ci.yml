name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Build runs entirely in mock mode with a throwaway DATABASE_URL — no real DB
# connection and no provider keys are needed to validate the codebase.
env:
  PIPELINE_MODE: mock
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
