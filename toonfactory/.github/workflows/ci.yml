name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  # Typecheck + production build in mock mode — no real DB or provider keys.
  build:
    runs-on: ubuntu-latest
    env:
      PIPELINE_MODE: mock
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run build

  # Unit + full-pipeline integration tests against a real Postgres (mock providers).
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: toon
          POSTGRES_PASSWORD: toon
          POSTGRES_DB: toonfactory
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U toon"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PIPELINE_MODE: mock
      DATABASE_URL: "postgresql://toon:toon@localhost:5432/toonfactory?schema=public"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm test
